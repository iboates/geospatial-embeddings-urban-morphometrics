# Experiment: Hex2Vec embedder on the House Sales in King County dataset
# Inherits defaults from configs/base.yaml — only overrides are listed here.

experiment_name: "hex2vec"

embedder:
  name: "Hex2Vec"
  hidden_sizes: [150, 75, 50]
  fit_kwargs:
    batch_size: 32
    trainer_kwargs:
      max_epochs: 10

training:
  epochs: 50
  batch_size: 32
  learning_rate: 0.001
  early_stopping_patience: 5
  loss: "SmoothL1"