# Experiment: UrbanMorphometricsEmbedder (no training needed) on House Sales in King County
# UrbanMorphometricsEmbedder do not require .fit() with OSM data
# — they count OSM features and aggregate Urban Morphometrics per region directly.

experiment_name: "count_urban_morpho"


embedder:
  name: "UrbanMorphometricsEmbedder"
  # UrbanMorphometricsEmbedder has no hidden_sizes — leave empty
  hidden_sizes: []
  fit_kwargs: {}            # UrbanMorphometricsEmbedder.fit() is a no-op; kept for interface uniformity

training:
  epochs: 50
  batch_size: 32
  learning_rate: 0.001
  early_stopping_patience: 5

morphometrics:
  neighbourhood_distance: 300
  num_quantiles: 4